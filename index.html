<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ludewa Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("hidden");
    }

    function toggleDropdown(id) {
      const el = document.getElementById(id);
      // Funga dropdown nyingine zote kwanza
      document.querySelectorAll(".dropdown-menu").forEach(menu => {
        if(menu.id !== id) menu.classList.add("hidden");
      });
      el.classList.toggle("hidden");
    }

    // Funga dropdown ukibonyeza nje ya menu
    window.addEventListener("click", function(e) {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll(".dropdown-menu").forEach(drop => {
          drop.classList.add("hidden");
        });
      }
    });
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-4 py-3">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="LDW Logo" class="h-12 bg-gray-200">
        <div>
          <h1 class="font-bold text-lg text-gray-900 leading-none">LDW</h1>
          <p class="text-xs md:text-sm text-gray-600">Ludewa District Examinations Council - LDEC</p>
        </div>
      </div>
      <button class="md:hidden text-blue-800 text-2xl p-2" onclick="toggleMenu()">☰</button>
    </div>

    <nav class="bg-blue-800 text-white hidden md:block">
      <div class="max-w-7xl mx-auto flex px-4">
        <a href="https://umawanjo.ac.tz/ludewa" class="px-4 py-3 hover:bg-blue-700 transition">Home</a>

        <div class="relative dropdown">
          <button onclick="toggleDropdown('examDropdown')" class="px-4 py-3 hover:bg-blue-700 flex items-center gap-1">
            Results Pre Mork (2026) <span>▾</span>
          </button>
          <div id="examDropdown" class="dropdown-menu absolute hidden bg-white text-gray-800 rounded shadow-xl mt-0 w-48 border z-50">
            <a href="https://umawanjo.ac.tz/ludewa/index.php?exam_id=1&class_level=Form+Two" class="block px-4 py-2 hover:bg-gray-100 border-b">Form Two</a>
            <a href="https://umawanjo.ac.tz/ludewa/index.php?exam_id=1&class_level=Form+FOUR" class="block px-4 py-2 hover:bg-gray-100">Form Four</a>
          </div>
        </div>

        <div class="relative dropdown">
          <button onclick="toggleDropdown('reportDropdown')" class="px-4 py-3 hover:bg-blue-700 flex items-center gap-1">
            Report Pre Mork (2026) <span>▾</span>
          </button>
          <div id="reportDropdown" class="dropdown-menu absolute hidden bg-white text-gray-800 rounded shadow-xl mt-0 w-48 border z-50">
            <a href="https://umawanjo.ac.tz/ludewa/complete_report.php?exam_id=1&class_level=Form+two" class="block px-4 py-2 hover:bg-gray-100 border-b">Form Two</a>
            <a href="https://umawanjo.ac.tz/ludewa/complete_report.php?exam_id=1&class_level=Form+four" class="block px-4 py-2 hover:bg-gray-100">Form Four</a>
          </div>
        </div>

        <div class="relative dropdown">
          <button onclick="toggleDropdown('resultsPCDropdown')" class="px-4 py-3 hover:bg-blue-700 flex items-center gap-1">
            Results-PC <span>▾</span>
          </button>
          <div id="resultsPCDropdown" class="dropdown-menu absolute hidden bg-white text-gray-800 rounded shadow-xl mt-0 w-48 border z-50">
            <a href="https://umawanjo.ac.tz/ludewa/complete_report.php?exam_id=1&class_level=Form+Two" class="block px-4 py-2 hover:bg-gray-100 border-b">Form Two</a>
            <a href="https://umawanjo.ac.tz/ludewa/complete_report.php?exam_id=1&class_level=Form+Four" class="block px-4 py-2 hover:bg-gray-100">Form Four</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <div id="mobileMenu" class="md:hidden hidden bg-blue-700 text-white px-4 py-3 space-y-2 shadow-lg fixed w-full z-40">
    <a href="https://umawanjo.ac.tz/ludewa" class="block py-2 border-b border-blue-600">Home</a>
    <details class="border-b border-blue-600">
      <summary class="cursor-pointer py-2 font-semibold">Results Pre Mork (2026)</summary>
      <div class="pl-4 pb-2 space-y-2 text-sm">
        <a href="https://umawanjo.ac.tz/ludewa/index.php?exam_id=1&class_level=Form+TWO" class="block">Form Two</a>
        <a href="https://umawanjo.ac.tz/ludewa/index.php?exam_id=1&class_level=Form+FOUR" class="block">Form Four</a>
      </div>
    </details>
    </div>

  <section class="bg-blue-50 py-16 text-center border-b">
    <h2 class="text-3xl font-extrabold mb-2 text-blue-900">WELCOME LUDEWA</h2>
    <p class="text-gray-600 max-w-xl mx-auto px-4">Providing reliable examination and results services across Ludewa District.</p>
  </section>

</body>
</html>
